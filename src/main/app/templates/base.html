<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Jenkins Secret Manager{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; }
    nav { background: #1a1a2e; color: white; padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 56px; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: #58a6ff; text-decoration: none; }
    nav a { color: #cdd9e5; text-decoration: none; font-size: 0.9rem; padding: 0.4rem 0.8rem; border-radius: 6px; transition: background 0.15s; }
    nav a:hover { background: rgba(255,255,255,0.1); }
    nav .badge { background: #e74c3c; color: white; border-radius: 10px; padding: 1px 7px; font-size: 0.75rem; margin-left: 4px; }
    .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
    .flash { padding: 0.9rem 1.2rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.95rem; }
    .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .flash.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1.1rem; border-radius: 7px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; text-decoration: none; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary  { background: #2563eb; color: white; }
    .btn-warning  { background: #f59e0b; color: white; }
    .btn-danger   { background: #dc2626; color: white; }
    .btn-ghost    { background: #f1f5f9; color: #475569; }
    .badge-active   { background: #d1fae5; color: #065f46; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; }
    .badge-expiring { background: #fef3c7; color: #92400e; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; }
    .badge-expired  { background: #fee2e2; color: #991b1b; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.75rem 1rem; background: #f8fafc; color: #64748b; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #e2e8f0; }
    td { padding: 0.85rem 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.92rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/">🔐 Jenkins Secret Manager</a>
    <a href="/">Dashboard</a>
    <a href="/secrets/add">+ Add Secret</a>
    <a href="/audit">Audit Log</a>
  </nav>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
